<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - Rethink</title>
  <meta name="description" content="{{DESC}}">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { blueprint: { bg: '#f8fafc', canvas: '#ffffff', border: '#cbd5e1', text: '#0f172a', sub: '#64748b' } },
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
        }
      }
    }
  </script>
  <style>
    :root { --c-bg: #f8fafc; --c-canvas: #ffffff; --c-border: #cbd5e1; --c-text: #0f172a; --c-sub: #64748b; }
    body { background: var(--c-bg); color: var(--c-text); font-family: 'Inter', sans-serif; }
    .blueprint-card { background: var(--c-canvas); border: 1px solid var(--c-border); }
    .section-title { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--c-sub); }
    .mono { font-family: 'JetBrains Mono', monospace; }
    a { text-decoration: none; }
    article h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.3; }
    article h2 { font-size: 1.5rem; font-weight: 600; margin: 2.5rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--c-border); }
    article h3 { font-size: 1.25rem; font-weight: 600; margin: 2rem 0 0.75rem; }
    article h4 { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.5rem; }
    article p { line-height: 1.8; margin-bottom: 1.25rem; color: #334155; }
    article ul, article ol { margin: 1rem 0; padding-left: 1.5rem; }
    article li { margin: 0.5rem 0; line-height: 1.8; color: #334155; }
    article ul { list-style-type: disc; }
    article ol { list-style-type: decimal; }
    article li > ul, article li > ol { margin: 0.5rem 0; }
    article blockquote { border-left: 3px solid var(--c-text); padding-left: 1rem; margin: 1.5rem 0; font-style: italic; color: var(--c-sub); }
    article code { background: #f1f5f9; padding: 0.125rem 0.375rem; font-size: 0.875rem; font-family: 'JetBrains Mono', monospace; }
    article pre { background: #1e293b; color: #e2e8f0; padding: 1.25rem; overflow-x: auto; margin: 1.5rem 0; }
    article pre code { background: none; padding: 0; color: inherit; }
    article hr { border: none; border-top: 1px solid var(--c-border); margin: 2.5rem 0; }
    article strong { font-weight: 600; color: var(--c-text); }
    article a { color: #0f172a; text-decoration: underline; }
    article a:hover { color: #64748b; }
  </style>
</head>
<body class="min-h-screen">
  <!-- Header -->
  <header class="border-b border-slate-300 bg-white">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <a href="/"><h1 class="text-2xl font-semibold tracking-tight hover:underline">RETHINK</h1></a>
        <p class="text-xs text-slate-500 mono mt-1">ENGINEERING NOTEBOOK</p>
      </div>
      <nav class="flex gap-6 text-sm">
        <a href="/blog" class="{{ACTIVE}} == 'writing' ? 'text-black font-medium' : 'text-slate-600 hover:text-black'">WRITING</a>
        <a href="/translations" class="{{ACTIVE}} == 'translation' ? 'text-black font-medium' : 'text-slate-600 hover:text-black'">TRANSLATIONS</a>
        <a href="/about" class="text-slate-600 hover:text-black">ABOUT</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-6 py-12">
    <!-- Breadcrumb -->
    <nav class="mb-8">
      <ol class="flex items-center gap-2 text-sm mono text-slate-500">
        <li><a href="/" class="hover:text-black">Home</a></li>
        <li>/</li>{{BREADCRUMB}}
        <li class="text-black">本文</li>
      </ol>
    </nav>

    <!-- Article -->
    <article class="blueprint-card p-8 md:p-12">
      <!-- Meta -->
      <div class="mb-8 pb-8 border-b border-slate-200">
        <span class="section-title">{{TYPE}}</span>
        <p class="mono text-sm text-slate-500 mt-2">{{DATE}}</p>
      </div>

      <!-- Content -->
      {{CONTENT}}
    </article>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-300 mt-16">
    <div class="max-w-4xl mx-auto px-6 py-8">
      <div class="flex items-center justify-between text-sm text-slate-500">
        <p class="mono">Rethink © 2026</p>
        <p class="mono">Built with HTML + Tailwind</p>
      </div>
    </div>
  </footer>
</body>
</html>
